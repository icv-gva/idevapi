schema: spec-driven

context: |
  Project: idevapi (JavaScript library + CSS + jQuery widgets for ICV/GVA cartographic visors).
  Stack: vanilla JavaScript (ES5/ES2015), esbuild for minification, jQuery 3.7.1, Leaflet 1.9.4, OpenLayers (vendored).
  Architecture: 3-layer load (local / GVA CDN / jsdelivr CDN); no IDEVAPI_VERSION env var; switch-idevapi.ps1 removed.
  Build: npm run build -> node build.js (esbuild bundling to *-min.js / *-min.css with source maps).
  Publish target: GitHub (icv-gva/idevapi) with version tags, served via jsdelivr CDN. No npm publish.
  Maintainer: GitHub account icv-gva.
  Local QA: visors under parent _visores_tester/ and ayuda/ (NOT in this git repo).
  Multilanguage: Spanish (es) + Valencian (va) using ";es;va" suffix pattern in property strings.
  Testing: no unit test runner; manual QA via HTML visors + build script as pre-publish gate.

rules:
  proposal:
    - Include rollback plan for any change that touches idevAPI_core.js (single source of truth, hot path)
    - Keep the 3-layer load contract (local / GVA / jsdelivr) intact unless explicitly refactored
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - When a property is bilingual, document the ";es;va" suffix convention
  design:
    - Document any change to idevAPI_core.js with sequence diagrams and full file impact list
    - Document esbuild entry changes (build.js) alongside the source files
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Always pair a source edit with its *-min.js rebuild verification
  apply:
    tdd: false
    test_command: ""
    build_command: "npm run build"
    minify_artifact_pattern: "{dir}/{name}-min.{ext}"
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
    manual_qa: "Open one or more visors under parent _visores_tester/ to validate"
  archive:
    - Warn before merging destructive deltas to idevAPI_core.js
    - Always keep source maps alongside minified outputs
